server {
    listen 8080;
    server_name _;

    # Request size limit — prevent huge circuits
    client_max_body_size 1m;

    # Proxy all traffic to the AstraCore simulation server
    location / {
        proxy_pass         http://astracore:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long-running simulations
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        proxy_pass         http://astracore:3000;
        proxy_cache_valid  200 1d;
        expires            1d;
        add_header         Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_types        text/plain text/css application/json application/javascript
                      image/svg+xml;
    gzip_comp_level   4;
    gzip_min_length   256;

    # Health check endpoint (used by docker healthcheck and load balancers)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
