name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --all --release

      - name: Test
        run: cargo test --all

      - name: Clippy
        run: cargo clippy --all -- -D warnings
        continue-on-error: true

  python-api:
    name: Python API (ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin + test deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip maturin pytest numpy

      - name: Build Python extension
        working-directory: astracore-py
        run: ../.venv/bin/maturin develop --release

      - name: Run Python tests
        run: .venv/bin/pytest tests/test_astracore.py -v
