name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --all --release

      - name: Test
        run: cargo test --all

      - name: Clippy
        run: cargo clippy --all -- -D warnings
        continue-on-error: true

  python-api:
    name: Python API (ubuntu)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin + test deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip maturin pytest numpy

      - name: Build Python extension
        working-directory: astracore-py
        run: ../.venv/bin/maturin develop --release

      - name: Run Python tests
        run: .venv/bin/pytest tests/test_astracore.py -v

  # ── VS Code extension build ────────────────────────────────────────────────
  extension:
    name: VS Code Extension
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-astracore/package.json

      - name: Install dependencies
        working-directory: vscode-astracore
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-astracore
        run: npm run compile

  # ── Benchmark regression (master only) ────────────────────────────────────
  benchmark:
    name: Benchmark
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run statevector benchmark
        run: cargo bench --bench statevector_scaling 2>&1 | tee bench_output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
        continue-on-error: true
